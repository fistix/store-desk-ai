providers:
  - name: gemini
    model: gemini-2.5-flash
    priority: 1
    api_key_env: GEMINI_API_KEY
    supports_tool_calling: true
    limit_type: requests_per_day
    limit: 1500
    reset: midnight_utc

  - name: openai
    model: gpt-4o-mini
    priority: 2
    api_key_env: OPENAI_API_KEY
    supports_tool_calling: true
    limit_type: none
